name: "Feature Toggle Demo"

on:
  pull_request:
    branches:
      - main

jobs:
  with_toggle:
    name: With feature toggle
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Start local workflow telemetry
      uses: ./
      with:
        enable_step_tracer: "true"
        enable_stat_collector: "false"
        enable_process_tracer: "false"
    - name: Run dummy job
      run: sleep 5
  without_toggle:
    name: Without feature toggle
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Start local workflow telemetry
      uses: ./
    - name: Run dummy job
      run: sleep 5
